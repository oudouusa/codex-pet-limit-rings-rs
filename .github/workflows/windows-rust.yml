name: Windows Rust

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths:
      - ".github/workflows/windows-rust.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "src/**"
      - "tools/*.ps1"
  pull_request:
    paths:
      - ".github/workflows/windows-rust.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "src/**"
      - "tools/*.ps1"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: PowerShell syntax
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Path tools -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) > $null
            if ($errors.Count -gt 0) {
              $failed = $true
              Write-Host "ERROR $($_.Name)"
              $errors | ForEach-Object { Write-Host $_.Message }
            }
          }
          if ($failed) { exit 1 }

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Render preview
        shell: pwsh
        run: cargo run -- --preview tmp/limit-rings-windows-preview.png --size 220
